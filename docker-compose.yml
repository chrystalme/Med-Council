# Two-container local/staging stack:
#   - db   : Postgres 15 + pgvector (listens on 5432, data persisted in a volume)
#   - api  : FastAPI backend, internal only — not published to the host
#   - web  : Next.js frontend, published on :3000 — proxies /api/* to the api
#            service via Next.js rewrites, so the browser only ever talks to web.
#
# CORS: ALLOWED_ORIGINS restricts the API to the web origin as defence in depth.
#       In this topology the browser never crosses origins, but the header keeps
#       stray direct calls (e.g. from a different tab) rejected.
#
# Usage:
#   cp .env.example .env          # fill in OPENROUTER_API_KEY, CLERK_* etc.
#   docker compose up --build
#   open http://localhost:3000

services:
  db:
    image: pgvector/pgvector:pg15
    container_name: medai-db
    environment:
      POSTGRES_USER: medai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medai}
      POSTGRES_DB: medai_council
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medai -d medai_council"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    # Exposed on the host for convenience (psql access). Remove if not needed.
    ports:
      - "5432:5432"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: medai-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Postgres — uses the compose network; hostname = service name.
      DATABASE_URL: postgresql://medai:${POSTGRES_PASSWORD:-medai}@db:5432/medai_council
      # Inference / tracing / auth — supply your own via the host env or a .env file.
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?set OPENROUTER_API_KEY in .env}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?set OPENAI_API_KEY in .env}
      # Free tier routes through Groq; paid tier models stay on OpenRouter.
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      CLERK_ISSUER: ${CLERK_ISSUER:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      CLERK_AUTHORIZED_PARTIES: ${CLERK_AUTHORIZED_PARTIES:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
      ONCALL_DOCTOR_EMAIL: ${ONCALL_DOCTOR_EMAIL:-}
      FEEDBACK_SECRET: ${FEEDBACK_SECRET:-}
      # Speech routes through OpenRouter by default; override per speech.py docs.
      SPEECH_PROVIDER: ${SPEECH_PROVIDER:-openrouter}
      # Storage: local filesystem inside the container; bind-mount in prod for persistence.
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      # CORS — browser only ever hits the web container; this locks direct access.
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      RATE_LIMIT_ENABLED: "1"
      PORT: "8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; urllib.request.urlopen(\"http://localhost:8080/health\", timeout=2); sys.exit(0)' || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s
    volumes:
      - api_storage:/app/storage_data
    # Not published to the host — only the web container reaches it via the
    # internal docker network at `http://api:8080`.
    expose:
      - "8080"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Baked into the client bundle. Relative /api keeps everything same-origin.
        NEXT_PUBLIC_API_BASE_URL: /api
    container_name: medai-web
    depends_on:
      api:
        condition: service_healthy
    environment:
      # Server-side only — the Next rewrite uses this to reach the api service
      # over the docker network.
      API_BASE_URL: http://api:8080
      NEXT_PUBLIC_API_BASE_URL: /api
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      PORT: "3000"
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  db_data:
  api_storage:
