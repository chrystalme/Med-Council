name: Deploy (dev)

# Auto-deploys to the dev Cloud Run services on every push to `develop`.
# Targets the `dev` GitHub environment (separate vars/secrets, no approval
# gate by default) and the `dev` Terraform workspace.

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to build and deploy. Leave blank to use the commit SHA.'
        required: false
        default: ''

concurrency:
  group: deploy-dev
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  dev:
    uses: ./.github/workflows/_deploy-gcp.yml
    with:
      environment: dev
      tf_workspace: dev
      tfvars_file: env/dev.tfvars
      image_latest_tag: dev-latest
      image_tag_input: ${{ github.event.inputs.image_tag }}
    secrets: inherit
