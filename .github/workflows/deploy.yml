name: Deploy (GCP)

# Builds both the api and web images, pushes them to Artifact Registry, then
# runs `terraform apply` to roll Cloud Run onto the new images together so
# the two services never drift.
#
# Triggers:
#   - push to main      — automatic on every merge.
#   - workflow_dispatch — manual button with an optional custom tag override.
#
# Secrets / context are routed through `env:` before being referenced in
# `run:` blocks; secrets that get baked into image build args are passed
# via the action's `build-args:` block only after being pinned to env.
#
# Required repo-level config (one-time setup):
#   secrets.GCP_WORKLOAD_IDENTITY_PROVIDER      WIF provider resource name
#   secrets.GCP_DEPLOY_SA                       service account email (deploy perms)
#   secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY   baked into web client bundle
#   vars.GCP_PROJECT_ID                         project id
#   vars.GCP_REGION                             e.g. us-central1
#   vars.GCP_TF_STATE_BUCKET                    GCS bucket backing terraform state
#   vars.API_BASE_URL                           deployed api URL (web build arg)
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to build and deploy. Leave blank to use the commit SHA.'
        required: false
        default: ''

concurrency:
  # One deploy at a time. `cancel-in-progress: false` lets a running apply
  # finish rather than getting torn down mid-update.
  group: deploy-gcp
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build, push, apply (api + web)
    runs-on: ubuntu-latest
    environment: production
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      TF_STATE_BUCKET: ${{ vars.GCP_TF_STATE_BUCKET }}
      IMAGE_TAG_INPUT: ${{ github.event.inputs.image_tag }}
      COMMIT_SHA: ${{ github.sha }}
      API_BASE_URL: ${{ vars.API_BASE_URL }}
      # Pin Clerk publishable key to an env var at job level so the
      # build-args block can reference it by name rather than by template
      # expansion inline.
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        run: |
          if [ -n "$IMAGE_TAG_INPUT" ]; then
            RESOLVED_TAG="$IMAGE_TAG_INPUT"
          else
            RESOLVED_TAG="$COMMIT_SHA"
          fi
          echo "RESOLVED_TAG=$RESOLVED_TAG" >> "$GITHUB_ENV"
          echo "Resolved image tag: $RESOLVED_TAG"

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}
          token_format: access_token

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: apps/api/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/medai/api:${{ env.RESOLVED_TAG }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/medai/api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          # Web Dockerfile needs the repo root as context (copies pnpm
          # workspace manifests + apps/web), so the context here is ".".
          context: .
          file: apps/web/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ env.API_BASE_URL }}
            API_BASE_URL=${{ env.API_BASE_URL }}
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ env.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/medai/web:${{ env.RESOLVED_TAG }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/medai/web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform init
        working-directory: terraform
        run: terraform init -backend-config="bucket=${TF_STATE_BUCKET}" -input=false

      - name: Terraform apply (rolls api + web onto the new tag)
        working-directory: terraform
        run: |
          terraform apply -input=false -auto-approve \
            -var="project_id=${PROJECT_ID}" \
            -var="region=${REGION}" \
            -var="image_tag=${RESOLVED_TAG}" \
            -var="web_image_tag=${RESOLVED_TAG}"

      - name: Report service URLs
        working-directory: terraform
        run: |
          API_URL="$(terraform output -raw service_url 2>/dev/null || echo 'n/a')"
          WEB_URL="$(terraform output -raw web_service_url 2>/dev/null || echo 'n/a')"
          {
            echo "### Deployment"
            echo "- tag: \`${RESOLVED_TAG}\`"
            echo "- api image: \`${REGION}-docker.pkg.dev/${PROJECT_ID}/medai/api:${RESOLVED_TAG}\`"
            echo "- web image: \`${REGION}-docker.pkg.dev/${PROJECT_ID}/medai/web:${RESOLVED_TAG}\`"
            echo "- api URL: ${API_URL}"
            echo "- web URL: ${WEB_URL}"
          } >> "$GITHUB_STEP_SUMMARY"
