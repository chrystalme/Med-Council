name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Lint runs but does not block — there is pre-existing lint debt from the
      # Next 16 / React 19 `react-hooks/set-state-in-effect` rule. Remove
      # `continue-on-error` once that debt is cleared.
      - name: Lint
        run: pnpm --filter web lint
        continue-on-error: true

      - name: Typecheck
        run: pnpm --filter web exec tsc --noEmit

      - name: Build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
        run: pnpm --filter web build

  api:
    name: API (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync deps
        run: uv sync --frozen

      - name: Import check
        run: uv run python -c "import main; import auth; import council; print('import ok')"
