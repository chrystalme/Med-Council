name: _deploy-gcp

# Reusable deploy workflow. Builds api + web images, pushes to Artifact
# Registry, then runs `terraform apply` against the requested workspace and
# tfvars file so dev and prod roll through the same pipeline. Callers pin the
# GitHub `environment:` so vars/secrets resolve per env and approval gates
# (configured on the environment) take effect.

on:
  workflow_call:
    inputs:
      environment:
        description: GitHub environment name (controls scoped vars/secrets and approval gates).
        required: true
        type: string
      tf_workspace:
        description: Terraform workspace name. Use 'default' for prod (preserves existing state).
        required: true
        type: string
      tfvars_file:
        description: Per-env tfvars path, relative to the terraform/ working directory.
        required: true
        type: string
      image_latest_tag:
        description: '"latest"-style tag pushed alongside :SHA (e.g. "latest", "dev-latest").'
        required: true
        type: string
      image_tag_input:
        description: Optional image tag override. Blank = commit SHA.
        required: false
        type: string
        default: ''

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build, push, apply (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      TF_STATE_BUCKET: ${{ vars.GCP_TF_STATE_BUCKET }}
      IMAGE_TAG_INPUT: ${{ inputs.image_tag_input }}
      COMMIT_SHA: ${{ github.sha }}
      API_BASE_URL: ${{ vars.API_BASE_URL }}
      LATEST_TAG: ${{ inputs.image_latest_tag }}
      TFVARS_FILE: ${{ inputs.tfvars_file }}
      TF_WORKSPACE_NAME: ${{ inputs.tf_workspace }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        run: |
          if [ -n "$IMAGE_TAG_INPUT" ]; then
            RESOLVED_TAG="$IMAGE_TAG_INPUT"
          else
            RESOLVED_TAG="$COMMIT_SHA"
          fi
          echo "RESOLVED_TAG=$RESOLVED_TAG" >> "$GITHUB_ENV"
          echo "Resolved image tag: $RESOLVED_TAG"

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}
          token_format: access_token

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: apps/api/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/medai/api:${{ env.RESOLVED_TAG }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/medai/api:${{ env.LATEST_TAG }}
          cache-from: type=gha,scope=api-${{ inputs.environment }}
          cache-to: type=gha,scope=api-${{ inputs.environment }},mode=max

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ env.API_BASE_URL }}
            API_BASE_URL=${{ env.API_BASE_URL }}
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ env.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/medai/web:${{ env.RESOLVED_TAG }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/medai/web:${{ env.LATEST_TAG }}
          cache-from: type=gha,scope=web-${{ inputs.environment }}
          cache-to: type=gha,scope=web-${{ inputs.environment }},mode=max

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform init
        working-directory: terraform
        run: terraform init -backend-config="bucket=${TF_STATE_BUCKET}" -input=false

      - name: Select Terraform workspace
        working-directory: terraform
        run: |
          if [ "$TF_WORKSPACE_NAME" = "default" ]; then
            terraform workspace select default
          else
            terraform workspace select -or-create "$TF_WORKSPACE_NAME"
          fi

      - name: Terraform apply (rolls api + web onto the new tag)
        working-directory: terraform
        run: |
          terraform apply -input=false -auto-approve \
            -var-file="$TFVARS_FILE" \
            -var="project_id=${PROJECT_ID}" \
            -var="region=${REGION}" \
            -var="image_tag=${RESOLVED_TAG}" \
            -var="web_image_tag=${RESOLVED_TAG}"

      - name: Report service URLs
        working-directory: terraform
        run: |
          API_URL="$(terraform output -raw service_url 2>/dev/null || echo 'n/a')"
          WEB_URL="$(terraform output -raw web_service_url 2>/dev/null || echo 'n/a')"
          {
            echo "### Deployment (${{ inputs.environment }})"
            echo "- workspace: \`${TF_WORKSPACE_NAME}\`"
            echo "- tag: \`${RESOLVED_TAG}\`"
            echo "- api image: \`${REGION}-docker.pkg.dev/${PROJECT_ID}/medai/api:${RESOLVED_TAG}\`"
            echo "- web image: \`${REGION}-docker.pkg.dev/${PROJECT_ID}/medai/web:${RESOLVED_TAG}\`"
            echo "- api URL: ${API_URL}"
            echo "- web URL: ${WEB_URL}"
          } >> "$GITHUB_STEP_SUMMARY"
